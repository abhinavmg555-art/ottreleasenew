<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTT Movie Tracker</title>
    <style>
:root {
    --bg-main: #141414;
    --bg-secondary: #000000;
    --text-primary: #ffffff;
    --text-secondary: #b3b3b3;
    --accent: #E50914; /* Netflix Red */
    --accent-hover: #f40612;
    --card-bg: #181818;
    --card-hover: #2f2f2f;
    --transition-speed: 0.3s;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-primary);
    overflow-x: hidden;
}

a {
    text-decoration: none;
    color: inherit;
}

.hidden {
    display: none !important;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 4%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(5px);
}

.logo h2 {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
}

.logo span {
    color: var(--text-primary);
}

.search-container {
    display: flex;
    align-items: center;
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid #333;
    border-radius: 4px;
    padding: 5px 10px;
    width: 300px;
    transition: width var(--transition-speed);
}

.search-container:focus-within {
    width: 350px;
    border-color: var(--text-secondary);
}

.search-container input {
    background: transparent;
    border: none;
    color: white;
    padding: 5px;
    width: 100%;
    outline: none;
}

.search-container button {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
}

.nav-links a {
    margin-left: 20px;
    font-weight: 500;
    transition: color var(--transition-speed);
}

.nav-links a:hover, .nav-links a.active {
    color: var(--accent);
}

/* Filters Bar */
.filters-bar {
    padding: 10px 4%;
    display: flex;
    justify-content: flex-end;
    margin-bottom: 20px;
}

.filter-group label {
    margin-right: 10px;
    color: var(--text-secondary);
    font-size: 14px;
}

.filter-group select {
    background: #000;
    color: white;
    border: 1px solid #333;
    padding: 5px 10px;
    border-radius: 4px;
    outline: none;
}

/* Container */
.container {
    padding: 20px 4%;
    min-height: 80vh;
}

.section-title {
    font-size: 20px;
    margin-bottom: 20px;
    font-weight: 500;
}

/* Movie Grid & Cards */
.movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.movie-card {
    background: var(--card-bg);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform var(--transition-speed), box-shadow var(--transition-speed);
    position: relative;
    border: 1px solid transparent;
}

.movie-card:hover {
    transform: scale(1.05);
    z-index: 10;
    box-shadow: 0 10px 20px rgba(0,0,0,0.8);
    border-color: #333;
}

.movie-poster {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

.movie-info {
    padding: 15px;
}

.movie-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.movie-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 10px;
}

.movie-overview {
    font-size: 12px;
    color: var(--text-secondary);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.ott-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: var(--accent);
    color: white;
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 4px;
    font-weight: bold;
}

.fav-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background 0.2s, color 0.2s;
}

.fav-btn:hover {
    background: white;
    color: var(--accent);
}

.fav-btn.active {
    color: var(--accent);
}

/* Modal */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(10px);
}

.modal-content {
    background: var(--card-bg);
    border-radius: 12px;
    max-width: 800px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    border: 1px solid #333;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    animation: modalScale 0.3s ease;
}

@keyframes modalScale {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: var(--text-secondary);
    z-index: 10;
}

.close-btn:hover {
    color: white;
}

.modal-body {
    display: flex;
    flex-direction: column;
}

@media (min-width: 768px) {
    .modal-body {
        flex-direction: row;
    }
}

.modal-poster {
    width: 100%;
    max-width: 300px;
    object-fit: cover;
    border-radius: 12px 0 0 12px;
}

@media (max-width: 767px) {
    .modal-poster {
        max-width: 100%;
        border-radius: 12px 12px 0 0;
        height: 300px;
    }
}

.modal-info {
    padding: 30px;
    flex: 1;
}

.modal-title {
    font-size: 28px;
    margin-bottom: 10px;
}

.modal-meta {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 20px;
    display: flex;
    gap: 15px;
}

.modal-overview {
    font-size: 15px;
    line-height: 1.6;
    color: #e5e5e5;
    margin-bottom: 20px;
}

.ott-providers h4 {
    margin-bottom: 10px;
    color: var(--text-secondary);
}

.providers-list {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.provider-logo {
    width: 40px;
    height: 40px;
    border-radius: 8px;
}

/* Loading & Errors */
.loading-spinner {
    text-align: center;
    padding: 50px;
}

.spinner {
    border: 4px solid rgba(255, 255, 255, 0.1);
    border-top: 4px solid var(--accent);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.error-msg {
    background: rgba(229, 9, 20, 0.2);
    color: var(--accent);
    padding: 15px;
    border-radius: 4px;
    text-align: center;
    margin-bottom: 20px;
    border: 1px solid rgba(229, 9, 20, 0.5);
}

/* Responsive Overrides */
@media (max-width: 768px) {
    .navbar {
        flex-direction: column;
        gap: 15px;
    }
    
    .search-container {
        width: 100%;
    }
    
    .search-container:focus-within {
        width: 100%;
    }

    .container {
        padding: 10px 2%;
    }

    .movie-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
    }

    .movie-card {
        background: transparent;
        border: none;
    }

    .movie-poster {
        height: 115px; /* Extremely compact to fit 4 columns */
        border-radius: 6px;
    }

    .movie-info {
        padding: 4px 1px;
    }

    .movie-title {
        font-size: 9px;
        margin-bottom: 2px;
        color: #ffffff;
    }

    .movie-meta {
        font-size: 8px;
        color: #a0a0a0;
    }

    .movie-overview {
        display: none; /* Hide the long summary text on phones just like the reference image */
    }

    .ott-badge {
        font-size: 9px;
        padding: 3px 6px;
    }
}

/* Credits Grid */
.credits-grid {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 10px 15px;
    font-size: 14px;
    margin-top: 15px;
    background: rgba(255, 255, 255, 0.03);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.05);
}

.credits-role {
    color: var(--accent);
    font-weight: 700;
    text-align: right;
}

.credits-names {
    color: #e5e5e5;
    line-height: 1.4;
}

/* Trailer Button */
.trailer-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: white;
    padding: 8px 15px;
    border-radius: 4px;
    font-weight: bold;
    margin-top: 5px;
    margin-bottom: 15px;
    transition: background var(--transition-speed), transform 0.2s;
}

.trailer-btn:hover {
    background: white;
    color: var(--accent);
    transform: scale(1.05);
}

/* Load More Button */
.load-more-btn {
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 10px 25px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 4px;
    cursor: pointer;
    transition: background var(--transition-speed), color var(--transition-speed);
}

.load-more-btn:hover {
    background: var(--accent);
    color: white;
}

    <script>
// TMDB API Configuration
const API_KEY = "34ebc60c76725558790de494aa5ff029";
const BASE_URL = "https://api.themoviedb.org/3";
const IMAGE_BASE_URL = "https://image.tmdb.org/t/p/w500";
const IMAGE_ORIGINAL_URL = "https://image.tmdb.org/t/p/original";

/**
 * Helper to fetch data from TMDB API
 */
async function fetchTMDB(endpoint, queryParams = {}) {
    if (API_KEY === "YOUR_API_KEY_HERE" || !API_KEY) {
        throw new Error("Missing TMDB API Key. Please add it to js/api.js.");
    }
    
    // Construct URL with query params
    const url = new URL(`${BASE_URL}${endpoint}`);
    url.searchParams.append("api_key", API_KEY);
    
    for (const [key, value] of Object.entries(queryParams)) {
        if (value) url.searchParams.append(key, value);
    }

    const response = await fetch(url);
    
    if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.status_message || `API Error: ${response.status}`);
    }
    
    return await response.json();
}

/**
 * Get trending movies (weekly)
 */
async function getTrendingMovies(lang = '', page = 1, year = '', genre = '') {
    const params = {
        sort_by: "popularity.desc",
        page: page,
        region: "IN"
    };
    if (lang) params.with_original_language = lang;
    if (year) params.primary_release_year = year;
    if (genre) params.with_genres = genre;
    
    return await fetchTMDB("/discover/movie", params);
}

/**
 * Get upcoming movies
 */
async function getUpcomingMovies(lang = '', page = 1, year = '', genre = '') {
    const today = new Date().toISOString().split('T')[0];
    const params = {
        sort_by: "popularity.desc",
        "primary_release_date.gte": today,
        page: page
    };
    if (lang) params.with_original_language = lang;
    if (year) params.primary_release_year = year;
    if (genre) params.with_genres = genre;

    return await fetchTMDB("/discover/movie", params);
}

/**
 * Search movies by query
 */
async function searchMovies(query, year = "", page = 1, genre = "") {
    const params = { query, page };
    if (year) params.primary_release_year = year;
    
    const response = await fetchTMDB("/search/movie", params);
    
    // TMDB Search API doesn't support with_genres natively, so loop in JS side.
    if (genre && response.results) {
        response.results = response.results.filter(m => m.genre_ids && m.genre_ids.includes(parseInt(genre)));
    }
    
    return response;
}

/**
 * Get advanced details of a movie (including providers)
 */
async function getMovieDetails(movieId) {
    return await fetchTMDB(`/movie/${movieId}`, { append_to_response: "watch/providers,release_dates,reviews,credits,videos" });
}



</script>
    <script>


/**
 * Show loading spinner
 */
function showLoading() {
    document.getElementById('loading').classList.remove('hidden');
}

/**
 * Hide loading spinner
 */
function hideLoading() {
    document.getElementById('loading').classList.add('hidden');
}

/**
 * Show error message
 */
function showError(message) {
    const errorEl = document.getElementById('errorMsg');
    errorEl.textContent = message;
    errorEl.classList.remove('hidden');
    setTimeout(() => {
        errorEl.classList.add('hidden');
    }, 5000); // Hide after 5 seconds
}

/**
 * Render movies to a specific grid element
 */
function renderMovies(gridElement, movies, favorites = [], onMovieClick, onFavoriteClick, append = false) {
    if (!append) gridElement.innerHTML = ''; // Clear existing
    
    if (!movies || movies.length === 0) {
        if (!append) gridElement.innerHTML = '<p style="color: var(--text-secondary);">No movies found.</p>';
        return;
    }

    movies.forEach(movie => {
        // Skip rendering if no poster available
        if (!movie.poster_path) return;

        const isFav = favorites.some(fav => fav.id === movie.id);
        
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.title = movie.title;
        
        const imgUrl = `${IMAGE_BASE_URL}${movie.poster_path}`;
        const releaseYear = movie.release_date ? movie.release_date.split('-')[0] : 'N/A';
        
        card.innerHTML = `
            <img src="${imgUrl}" alt="${movie.title}" class="movie-poster" loading="lazy">
            <button class="fav-btn ${isFav ? 'active' : ''}" data-id="${movie.id}">
                <i class="fa-solid fa-heart"></i>
            </button>
            <div class="movie-info">
                <h4 class="movie-title">${movie.title}</h4>
                <div class="movie-meta">
                    <span>${releaseYear}</span>
                    <span><i class="fa-solid fa-star" style="color: gold;"></i> ${movie.vote_average ? movie.vote_average.toFixed(1) : 'NR'}</span>
                </div>
                <p class="movie-overview">${movie.overview || 'No overview available.'}</p>
            </div>
        `;

        // Card Click Event for Details
        card.addEventListener('click', (e) => {
            if (e.target.closest('.fav-btn')) return; // Ignore if clicking favorite button
            onMovieClick(movie.id);
        });

        // Favorite Button Event
        const favBtn = card.querySelector('.fav-btn');
        favBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            onFavoriteClick(movie, favBtn);
        });

        gridElement.appendChild(card);
    });
}

/**
 * Render Movie Details Modal
 */
function renderModal(details) {
    const modal = document.getElementById('movieModal');
    const modalBody = document.getElementById('modalBody');
    
    const posterUrl = details.poster_path ? `${IMAGE_BASE_URL}${details.poster_path}` : 'https://via.placeholder.com/300x450';
    const releaseYear = details.release_date ? details.release_date.split('-')[0] : 'N/A';
    
    // Format Runtime to "2h 15m" style
    let runtimeStr = 'Unknown Runtime';
    if (details.runtime) {
        const hours = Math.floor(details.runtime / 60);
        const mins = details.runtime % 60;
        runtimeStr = hours > 0 ? `${hours}h ${mins}m` : `${mins}m`;
    }

    // Format Genres to "Action/Adventure" style
    const genreStr = (details.genres && details.genres.length > 0) 
        ? details.genres.map(g => g.name).join('/') 
        : 'Unknown Genre';

    const revenue = details.revenue && details.revenue > 0 ? `$${(details.revenue / 1000000).toFixed(1)}M` : 'Unknown';
    
    // Extract digital (OTT) release date by checking multiple regions
    let digitalDateStr = '';
    if (details.release_dates && details.release_dates.results) {
        let localReleases = details.release_dates.results.find(r => r.iso_3166_1 === 'IN') 
                         || details.release_dates.results.find(r => r.iso_3166_1 === 'US');
        
        // If still nothing, just grab the very first country that has any info
        if (!localReleases && details.release_dates.results.length > 0) {
            localReleases = details.release_dates.results[0];
        }
                         
        if (localReleases && localReleases.release_dates) {
            const digital = localReleases.release_dates.find(d => d.type === 4); // Type 4 is Digital/OTT
            if (digital) {
                const dateObj = new Date(digital.release_date.split('T')[0]);
                digitalDateStr = dateObj.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            }
        }
    }
    
    // Extract Age Certification (e.g. U, UA, R)
    let certification = '';
    if (details.release_dates && details.release_dates.results) {
        const inReleases = details.release_dates.results.find(r => r.iso_3166_1 === 'IN') || details.release_dates.results.find(r => r.iso_3166_1 === 'US');
        if (inReleases && inReleases.release_dates) {
            const cert = inReleases.release_dates.find(d => d.certification && d.certification !== '');
            if (cert) certification = cert.certification;
        }
    }
    const certString = certification ? ` • ${certification}` : '';
    
    // Process OTT Providers (Check IN, then US, then ANY country to find a platform)
    const allProvidersInfo = (details['watch/providers'] && details['watch/providers'].results) ? details['watch/providers'].results : {};
    let providers = allProvidersInfo['IN'] || allProvidersInfo['US'];
    
    if (!providers) {
        // Fallback to any region that has flatrate
        const backupRegion = Object.keys(allProvidersInfo).find(k => allProvidersInfo[k].flatrate);
        if (backupRegion) providers = allProvidersInfo[backupRegion];
        else providers = {};
    }
    
    // Grab the official watch index link
    const watchLink = providers.link || `https://www.themoviedb.org/movie/${details.id}/watch`;
    
    const flatrateProviders = providers.flatrate || [];
    const rentProviders = providers.rent || [];
    const buyProviders = providers.buy || [];
    
    const allProvidersMap = new Map();
    [...flatrateProviders, ...rentProviders, ...buyProviders].forEach(p => {
        if (!allProvidersMap.has(p.provider_id)) {
            allProvidersMap.set(p.provider_id, p);
        }
    });
    
    const combinedProviders = Array.from(allProvidersMap.values());
    const topProviderName = combinedProviders.length > 0 ? combinedProviders[0].provider_name : '';
    
    // Generate the custom OTT release sentence the user requested
    let ottReleaseSentence = '';
    if (topProviderName && digitalDateStr) {
        ottReleaseSentence = `<p style="color: #E50914; font-weight: 800; font-size: 16px; margin: 15px 0;">
                                 <i class="fa-solid fa-play"></i> Releasing on ${topProviderName} on ${digitalDateStr}
                              </p>`;
    } else if (topProviderName) {
         ottReleaseSentence = `<p style="color: #E50914; font-weight: 800; font-size: 16px; margin: 15px 0;">
                                 <i class="fa-solid fa-play"></i> Streaming on ${topProviderName}
                              </p>`;
    } else if (digitalDateStr) {
         ottReleaseSentence = `<p style="color: #E50914; font-weight: 800; font-size: 16px; margin: 15px 0;">
                                 <i class="fa-solid fa-play"></i> Releasing Digitally on ${digitalDateStr}
                              </p>`;
    }

    let providersHtml = '';
    if (combinedProviders.length > 0) {
        providersHtml = `
            <div class="ott-providers" style="margin-top: 10px;">
                <p style="color: var(--text-secondary); font-size: 12px; margin-bottom: 5px;">*Click a logo to open directly in a new tab</p>
                <div class="providers-list">
                    ${combinedProviders.map(p => `
                        <a href="${watchLink}" target="_blank" style="transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                            <img class="provider-logo" src="${IMAGE_BASE_URL}${p.logo_path}" alt="${p.provider_name}" title="Watch on ${p.provider_name} (Opens in new tab)">
                        </a>
                    `).join('')}
                </div>
            </div>
        `;
    } else {
         providersHtml = `
            <div class="ott-providers" style="margin-top: 15px;">
                <p style="color: var(--text-secondary); font-size: 13px;"><i class="fa-solid fa-circle-info"></i> TMDB database does not have an OTT platform confirmed for this movie yet.</p>
            </div>
        `;
    }

    // Process Reviews
    let reviewHtml = '';
    if (details.reviews && details.reviews.results && details.reviews.results.length > 0) {
        const topReview = details.reviews.results[0]; // grab the most relevant review
        let contentShort = topReview.content;
        if (contentShort.length > 250) contentShort = contentShort.substring(0, 250) + '...';
        
        // Use Regex to convert any raw http links in the review text to actual clickable <a> tags
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        contentShort = contentShort.replace(urlRegex, '<a href="$1" target="_blank" style="color: #4da8da; text-decoration: underline;" title="Open link in new tab">$1</a>');

        reviewHtml = `
            <div class="movie-review" style="margin-top: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;">
                <h4 style="color: var(--accent); margin-bottom: 8px;"><i class="fa-solid fa-comment-dots"></i> Review by ${topReview.author}</h4>
                <p style="font-size: 14px; font-style: italic; color: #ddd; line-height: 1.5;">"${contentShort}"</p>
                <a href="${topReview.url}" target="_blank" style="font-size: 12px; color: var(--text-secondary); margin-top: 10px; display: inline-block;">Read full review on TMDB <i class="fa-solid fa-arrow-up-right-from-square"></i></a>
            </div>
        `;
    }

    // Process Credits (Cast & Crew)
    let creditsHtml = '';
    if (details.credits) {
        let gridRows = '';
        
        // Cast (Top 6)
        if (details.credits.cast && details.credits.cast.length > 0) {
            const topCast = details.credits.cast.slice(0, 6).map(c => c.name).join(', ');
            gridRows += `
                <div class="credits-role">Cast</div>
                <div class="credits-names">${topCast}</div>
            `;
        }
        
        // Crew (Director, Producer, Music)
        if (details.credits.crew) {
            const directors = details.credits.crew.filter(c => c.job === 'Director').map(c => c.name).join(', ');
            const producers = details.credits.crew.filter(c => c.job === 'Producer').slice(0, 3).map(c => c.name).join(', ');
            const musicPeople = details.credits.crew.filter(c => c.job === 'Original Music Composer' || c.job === 'Music Director' || c.job === 'Music').slice(0, 2).map(c => c.name).join(', ');
            
            if (directors) {
                gridRows += `
                    <div class="credits-role">Director</div>
                    <div class="credits-names">${directors}</div>
                `;
            }
            if (producers) {
                gridRows += `
                    <div class="credits-role">Producer</div>
                    <div class="credits-names">${producers}</div>
                `;
            }
            if (musicPeople) {
                gridRows += `
                    <div class="credits-role">Music By</div>
                    <div class="credits-names">${musicPeople}</div>
                `;
            }
        }
        
        if (gridRows) {
            creditsHtml = `<div class="credits-grid">${gridRows}</div>`;
        }
    }

    // Extract Trailer
    let trailerHtml = '';
    if (details.videos && details.videos.results) {
        // Find Official YouTube Trailer (fallback to any YouTube video if trailer missing)
        const trailer = details.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube') 
                     || details.videos.results.find(v => v.site === 'YouTube');
        
        if (trailer) {
            trailerHtml = `
                <a href="https://www.youtube.com/watch?v=${trailer.key}" target="_blank" class="trailer-btn" title="Watch Trailer on YouTube">
                    <i class="fa-brands fa-youtube" style="font-size: 18px;"></i> Watch Trailer
                </a>
            `;
        }
    }

    modalBody.innerHTML = `
        <img src="${posterUrl}" alt="${details.title}" class="modal-poster">
        <div class="modal-info">
            <h2 class="modal-title" style="margin-bottom: 5px;">${details.title}</h2>
            <p style="color: var(--text-secondary); font-size: 15px; margin-bottom: 15px;">
                ${releaseYear}${certString} • ${genreStr} • ${runtimeStr}
            </p>
            ${trailerHtml}
            <div class="modal-meta">
                ${digitalDateStr ? `<span style="color: var(--accent);" title="Digital OTT Release Date"><i class="fa-solid fa-laptop"></i> OTT: ${digitalDateStr}</span>` : ''}
                <span title="Box Office Earnings"><i class="fa-solid fa-sack-dollar"></i> ${revenue}</span>
                <span title="User Rating"><i class="fa-solid fa-star" style="color: gold;"></i> ${details.vote_average.toFixed(1)}</span>
            </div>
            ${creditsHtml}
            ${ottReleaseSentence}
            ${providersHtml}
            <p class="modal-overview" style="margin-top: 15px;">${details.overview}</p>
            ${reviewHtml}
        </div>
    `;

    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden'; // Prevent scrolling
}

/**
 * Initial UI setup (closing modal)
 */
function setupUI() {
    const modal = document.getElementById('movieModal');
    const closeBtn = document.querySelector('.close-btn');

    closeBtn.addEventListener('click', () => {
        modal.classList.add('hidden');
        document.body.style.overflow = 'auto'; // Restore scrolling
    });

    window.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }
    });
}

</script>
    <script>


// DOM Elements
const trendingGrid = document.getElementById('trendingGrid');
const upcomingGrid = document.getElementById('upcomingGrid');
const resultsGrid = document.getElementById('resultsGrid');
const trendingSection = document.getElementById('trendingSection');
const upcomingSection = document.getElementById('upcomingSection');
const resultsSection = document.getElementById('resultsSection');
const resultsTitle = document.getElementById('resultsTitle');

const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const yearFilter = document.getElementById('yearFilter');
const langFilter = document.getElementById('langFilter');
const genreFilter = document.getElementById('genreFilter');

const navHome = document.getElementById('navHome');
const navFavorites = document.getElementById('navFavorites');

// State
let favorites = JSON.parse(localStorage.getItem('ottFavorites')) || [];
let trendingData = [];
let upcomingData = [];
let currentView = 'home'; // home, search, favorites

const loadMoreTrendingBtn = document.getElementById('loadMoreTrendingBtn');
const loadMoreUpcomingBtn = document.getElementById('loadMoreUpcomingBtn');
const loadMoreResultsBtn = document.getElementById('loadMoreResultsBtn');

let trendingPage = 1;
let upcomingPage = 1;
let searchPage = 1;
let currentSearchQuery = '';

async function fetchData() {
    showLoading();
    trendingPage = 1;
    upcomingPage = 1;
    try {
        const lang = langFilter ? langFilter.value : '';
        const year = yearFilter ? yearFilter.value : '';
        const genre = genreFilter ? genreFilter.value : '';
        
        const [trendingDataResponse, upcomingDataResponse] = await Promise.all([
            getTrendingMovies(lang, trendingPage, year, genre).catch(() => ({ results: [] })),
            getUpcomingMovies(lang, upcomingPage, year, genre).catch(() => ({ results: [] }))
        ]);

        trendingData = trendingDataResponse.results;
        upcomingData = upcomingDataResponse.results;

        refreshView();
    } catch (err) {
        showError(err.message || "Failed to load data. Check API Key.");
    } finally {
        hideLoading();
    }
}

// Initialize
function init() {
    setupUI();
    
    const currentYear = new Date().getFullYear();
    yearFilter.innerHTML = '<option value="">All Years</option>';
    for (let y = currentYear + 2; y >= 1950; y--) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        yearFilter.appendChild(opt);
    }
    
    fetchData();
}

// Refresh the current view
function refreshView() {
    if (currentView === 'home') {
        trendingSection.classList.remove('hidden');
        upcomingSection.classList.remove('hidden');
        resultsSection.classList.add('hidden');

        // Render full arrays (year filtering happens in API now)
        renderMovies(trendingGrid, trendingData, favorites, handleMovieClick, handleFavoriteToggle);
        renderMovies(upcomingGrid, upcomingData, favorites, handleMovieClick, handleFavoriteToggle);
        
        loadMoreTrendingBtn.classList.remove('hidden');
        loadMoreUpcomingBtn.classList.remove('hidden');
    } else if (currentView === 'favorites') {
        trendingSection.classList.add('hidden');
        upcomingSection.classList.add('hidden');
        resultsSection.classList.remove('hidden');
        resultsTitle.textContent = 'Your Favorite Movies';

        const year = yearFilter ? yearFilter.value : '';
        const favFiltered = year ? favorites.filter(m => m.release_date && m.release_date.startsWith(year)) : favorites;

        renderMovies(resultsGrid, favFiltered, favorites, handleMovieClick, handleFavoriteToggle);
        loadMoreResultsBtn.classList.add('hidden'); // no pagination for local storage favorites
    }
}

// Handlers
async function handleMovieClick(id) {
    showLoading();
    try {
        const details = await getMovieDetails(id);
        renderModal(details);
    } catch (err) {
        showError("Failed to fetch movie details. Check API Key.");
    } finally {
        hideLoading();
    }
}

function handleFavoriteToggle(movie, btnEl) {
    const isFav = favorites.some(fav => fav.id === movie.id);
    if (isFav) {
        favorites = favorites.filter(fav => fav.id !== movie.id);
        btnEl.classList.remove('active');
    } else {
        favorites.push(movie);
        btnEl.classList.add('active');
    }
    localStorage.setItem('ottFavorites', JSON.stringify(favorites));
    
    if (currentView === 'favorites') {
        refreshView();
    }
}

async function performSearch(isAppend = false) {
    const query = searchInput.value.trim();
    if (!query) {
        currentView = 'home';
        refreshView();
        return;
    }

    currentView = 'search';
    if (!isAppend) {
        showLoading();
        searchPage = 1;
        currentSearchQuery = query;
    } else {
        searchPage++;
        loadMoreResultsBtn.textContent = 'Loading...';
    }

    try {
        const year = yearFilter ? yearFilter.value : '';
        const genre = genreFilter ? genreFilter.value : '';
        const res = await searchMovies(currentSearchQuery, year, searchPage, genre);
        
        trendingSection.classList.add('hidden');
        upcomingSection.classList.add('hidden');
        resultsSection.classList.remove('hidden');
        loadMoreResultsBtn.classList.remove('hidden');

        if (!isAppend) resultsTitle.textContent = `Search Results for "${currentSearchQuery}"`;
        
        renderMovies(resultsGrid, res.results, favorites, handleMovieClick, handleFavoriteToggle, isAppend);
    } catch (err) {
        showError(err.message || "Search failed.");
    } finally {
        hideLoading();
        loadMoreResultsBtn.textContent = 'Load More Results';
    }
}

// Event Listeners
searchBtn.addEventListener('click', () => performSearch(false));
searchInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') performSearch(false);
});

yearFilter.addEventListener('change', () => {
    if (currentView === 'search' && searchInput.value.trim()) {
        performSearch(false);
    } else {
        fetchData(); // re-fetch with new year
    }
});

genreFilter.addEventListener('change', () => {
    if (currentView === 'search' && searchInput.value.trim()) {
        performSearch(false);
    } else {
        fetchData(); // re-fetch with new genre
    }
});

langFilter.addEventListener('change', () => {
    if (currentView === 'home') {
        fetchData();
    }
});

navHome.addEventListener('click', (e) => {
    e.preventDefault();
    currentView = 'home';
    searchInput.value = '';
        navHome.classList.add('active');
    navFavorites.classList.remove('active');
    yearFilter.value = ''; // Reset filter
    genreFilter.value = ''; // Reset filter
    fetchData();
});

navFavorites.addEventListener('click', (e) => {
    e.preventDefault();
    currentView = 'favorites';
    navFavorites.classList.add('active');
    navHome.classList.remove('active');
    refreshView();
});

// Load More Handlers
loadMoreTrendingBtn.addEventListener('click', async () => {
    trendingPage++;
    loadMoreTrendingBtn.textContent = 'Loading...';
try {
        const lang = langFilter ? langFilter.value : '';
        const year = yearFilter ? yearFilter.value : '';
        const genre = genreFilter ? genreFilter.value : '';
        const res = await getTrendingMovies(lang, trendingPage, year, genre);
        trendingData = [...trendingData, ...res.results];
        renderMovies(trendingGrid, res.results, favorites, handleMovieClick, handleFavoriteToggle, true);
    } catch(e) { showError(e.message); }
    loadMoreTrendingBtn.textContent = 'Load More Trending';
});

loadMoreUpcomingBtn.addEventListener('click', async () => {
    upcomingPage++;
    loadMoreUpcomingBtn.textContent = 'Loading...';
try {
        const lang = langFilter ? langFilter.value : '';
        const year = yearFilter ? yearFilter.value : '';
        const genre = genreFilter ? genreFilter.value : '';
        const res = await getUpcomingMovies(lang, upcomingPage, year, genre);
        upcomingData = [...upcomingData, ...res.results];
        renderMovies(upcomingGrid, res.results, favorites, handleMovieClick, handleFavoriteToggle, true);
    } catch(e) { showError(e.message); }
    loadMoreUpcomingBtn.textContent = 'Load More Upcoming';
});

loadMoreResultsBtn.addEventListener('click', () => performSearch(true));

// Boot
document.addEventListener('DOMContentLoaded', init);

</script>
