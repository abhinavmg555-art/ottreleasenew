<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTT Movie Tracker</title>
    <style>:root {
    --bg-main: #141414;
    --bg-secondary: #000000;
    --text-primary: #ffffff;
    --text-secondary: #b3b3b3;
    --accent: #E50914; /* Netflix Red */
    --accent-hover: #f40612;
    --card-bg: #181818;
    --card-hover: #2f2f2f;
    --transition-speed: 0.3s;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-primary);
    overflow-x: hidden;
}

a {
    text-decoration: none;
    color: inherit;
}

.hidden {
    display: none !important;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 4%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(5px);
}

.logo h2 {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
}

.logo span {
    color: var(--text-primary);
}

.search-container {
    display: flex;
    align-items: center;
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid #333;
    border-radius: 4px;
    padding: 5px 10px;
    width: 300px;
    transition: width var(--transition-speed);
}

.search-container:focus-within {
    width: 350px;
    border-color: var(--text-secondary);
}

.search-container input {
    background: transparent;
    border: none;
    color: white;
    padding: 5px;
    width: 100%;
    outline: none;
}

.search-container button {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
}

.nav-links a {
    margin-left: 20px;
    font-weight: 500;
    transition: color var(--transition-speed);
}

.nav-links a:hover, .nav-links a.active {
    color: var(--accent);
}

/* Filters Bar */
.filters-bar {
    padding: 10px 4%;
    display: flex;
    justify-content: flex-end;
    margin-bottom: 20px;
}

.filter-group label {
    margin-right: 10px;
    color: var(--text-secondary);
    font-size: 14px;
}

.filter-group select {
    background: #000;
    color: white;
    border: 1px solid #333;
    padding: 5px 10px;
    border-radius: 4px;
    outline: none;
}

/* Container */
.container {
    padding: 20px 4%;
    min-height: 80vh;
}

.section-title {
    font-size: 20px;
    margin-bottom: 20px;
    font-weight: 500;
}

/* Movie Grid & Cards */
.movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.movie-card {
    background: var(--card-bg);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform var(--transition-speed), box-shadow var(--transition-speed);
    position: relative;
    border: 1px solid transparent;
}

.movie-card:hover {
    transform: scale(1.05);
    z-index: 10;
    box-shadow: 0 10px 20px rgba(0,0,0,0.8);
    border-color: #333;
}

.movie-poster {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

.movie-info {
    padding: 15px;
}

.movie-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.movie-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 10px;
}

.movie-overview {
    font-size: 12px;
    color: var(--text-secondary);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.ott-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: var(--accent);
    color: white;
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 4px;
    font-weight: bold;
}

.fav-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background 0.2s, color 0.2s;
}

.fav-btn:hover {
    background: white;
    color: var(--accent);
}

.fav-btn.active {
    color: var(--accent);
}

/* Modal */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(10px);
}

.modal-content {
    background: var(--card-bg);
    border-radius: 12px;
    max-width: 800px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    border: 1px solid #333;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    animation: modalScale 0.3s ease;
}

@keyframes modalScale {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: var(--text-secondary);
    z-index: 10;
}

.close-btn:hover {
    color: white;
}

.modal-body {
    display: flex;
    flex-direction: column;
}

@media (min-width: 768px) {
    .modal-body {
        flex-direction: row;
    }
}

.modal-poster {
    width: 100%;
    max-width: 300px;
    object-fit: cover;
    border-radius: 12px 0 0 12px;
}

@media (max-width: 767px) {
    .modal-poster {
        max-width: 100%;
        border-radius: 12px 12px 0 0;
        height: 300px;
    }
}

.modal-info {
    padding: 30px;
    flex: 1;
}

.modal-title {
    font-size: 28px;
    margin-bottom: 10px;
}

.modal-meta {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 20px;
    display: flex;
    gap: 15px;
}

.modal-overview {
    font-size: 15px;
    line-height: 1.6;
    color: #e5e5e5;
    margin-bottom: 20px;
}

.ott-providers h4 {
    margin-bottom: 10px;
    color: var(--text-secondary);
}

.providers-list {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.provider-logo {
    width: 40px;
    height: 40px;
    border-radius: 8px;
}

/* Loading & Errors */
.loading-spinner {
    text-align: center;
    padding: 50px;
}

.spinner {
    border: 4px solid rgba(255, 255, 255, 0.1);
    border-top: 4px solid var(--accent);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.error-msg {
    background: rgba(229, 9, 20, 0.2);
    color: var(--accent);
    padding: 15px;
    border-radius: 4px;
    text-align: center;
    margin-bottom: 20px;
    border: 1px solid rgba(229, 9, 20, 0.5);
}

/* Responsive Overrides */
@media (max-width: 768px) {
    .navbar {
        flex-direction: column;
        gap: 15px;
    }
    
    .search-container {
        width: 100%;
    }
    
    .search-container:focus-within {
        width: 100%;
    }
}

/* Credits Grid */
.credits-grid {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 10px 15px;
    font-size: 14px;
    margin-top: 15px;
    background: rgba(255, 255, 255, 0.03);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.05);
}

.credits-role {
    color: var(--accent);
    font-weight: 700;
    text-align: right;
}

.credits-names {
    color: #e5e5e5;
    line-height: 1.4;
}

/* Trailer Button */
.trailer-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: white;
    padding: 8px 15px;
    border-radius: 4px;
    font-weight: bold;
    margin-top: 5px;
    margin-bottom: 15px;
    transition: background var(--transition-speed), transform 0.2s;
}

.trailer-btn:hover {
    background: white;
    color: var(--accent);
    transform: scale(1.05);
}

/* Load More Button */
.load-more-btn {
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 10px 25px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 4px;
    cursor: pointer;
    transition: background var(--transition-speed), color var(--transition-speed);
}

.load-more-btn:hover {
    background: var(--accent);
    color: white;
}
